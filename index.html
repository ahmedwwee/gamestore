<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الألعاب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f1a;
    --surface:   #151826;
    --card:      #1c1f33;
    --border:    #252840;
    --accent:    #6c63ff;
    --accent2:   #a78bfa;
    --green:     #22d3a0;
    --text:      #e8eaf6;
    --muted:     #8b8fa8;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0d0f1a 0%, #1a1040 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
  }
  .logo {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }
  .badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .badge span { color: var(--accent2); font-weight: 700; }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(135deg, #0d0f1a 0%, #1a1040 50%, #0d1a2a 100%);
    padding: 60px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(108,99,255,.18) 0%, transparent 70%);
  }
  .hero h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    line-height: 1.2;
    position: relative;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    position: relative;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    position: relative;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Filters ── */
  .filters {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Grid ── */
  .grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 16px;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(108,99,255,.2);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-top: auto;
  }
  .dl-count {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card-btn {
    display: block;
    margin: 0 12px 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-align: center;
    text-decoration: none;
    border-radius: 8px;
    padding: 9px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    transition: opacity .2s;
  }
  .card-btn:hover { opacity: .88; }

  /* ── Empty / Loading ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius);
    height: 220px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 32px 24px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }
  footer a { color: var(--accent2); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .hero-stats { gap: 20px; }
    .games-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-img { aspect-ratio: 1/1; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo">🎮 GameStore</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن لعبة...">
    </div>
    <div class="badge">المنشورات: <span id="totalCount">...</span></div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <h1>أفضل الألعاب المهكرة<br><em>في مكان واحد</em></h1>
  <p>يتحدث تلقائياً مع البوت — كل منشور جديد يظهر هنا فوراً</p>
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num" id="statGames">─</div>
      <div class="stat-label">لعبة متاحة</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statDownloads">─</div>
      <div class="stat-label">تحميل إجمالي</div>
    </div>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">🎮 الكل</button>
  <button class="filter-btn" data-filter="new">✨ الأحدث</button>
  <button class="filter-btn" data-filter="top">🔥 الأكثر تحميلاً</button>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="section-title" id="sectionTitle">جميع الألعاب</div>
  <div class="games-grid" id="gamesGrid">
    <!-- skeleton loaders -->
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>يتحدث تلقائياً من البوت • <a href="#" id="botLink">فتح البوت</a></p>
</footer>

<script>
// ══════════════════════════════════════════
//  إعدادات — غيّر هذا الرابط فقط
// ══════════════════════════════════════════
const POSTS_JSON_URL = "posts.json";   // رابط ملف posts.json
const BOT_USERNAME   = "kkn5bot";      // يوزر البوت بدون @

// ══════════════════════════════════════════

let allPosts = [];
let currentFilter = "all";
let searchQuery   = "";

// ── جلب البيانات ─────────────────────────
async function loadPosts() {
  try {
    const res  = await fetch(POSTS_JSON_URL + "?t=" + Date.now());
    const data = await res.json();
    const posts = data.posts || {};

    allPosts = Object.entries(posts).map(([key, p]) => ({
      key,
      title:     p.title     || "لعبة",
      deep_link: p.deep_link || `https://t.me/${BOT_USERNAME}?start=${key}`,
      downloads: p.downloads || 0,
      created_at:p.created_at|| "",
      thumb:     p.thumb     || null,
    }));

    updateStats();
    render();
  } catch (e) {
    document.getElementById("gamesGrid").innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h3>تعذّر تحميل البيانات</h3>
        <p>تأكد أن ملف posts.json موجود في نفس مجلد الموقع</p>
      </div>`;
  }
}

// ── إحصائيات ─────────────────────────────
function updateStats() {
  const total = allPosts.length;
  const totalDl = allPosts.reduce((s, p) => s + p.downloads, 0);
  document.getElementById("statGames").textContent     = total;
  document.getElementById("statDownloads").textContent = totalDl;
  document.getElementById("totalCount").textContent    = total;
  document.getElementById("botLink").href = `https://t.me/${BOT_USERNAME}`;
}

// ── فلترة وترتيب ─────────────────────────
function getFiltered() {
  let list = [...allPosts];

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.title.toLowerCase().includes(q));
  }

  if (currentFilter === "new") {
    list.sort((a, b) => b.created_at.localeCompare(a.created_at));
  } else if (currentFilter === "top") {
    list.sort((a, b) => b.downloads - a.downloads);
  } else {
    list.sort((a, b) => b.created_at.localeCompare(a.created_at));
  }

  return list;
}

// ── رسم الكروت ───────────────────────────
function render() {
  const grid = document.getElementById("gamesGrid");
  const list = getFiltered();

  const labels = { all: "جميع الألعاب", new: "الأحدث إضافةً", top: "الأكثر تحميلاً" };
  document.getElementById("sectionTitle").textContent =
    searchQuery ? `نتائج البحث عن "${searchQuery}"` : labels[currentFilter];

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>لا توجد نتائج</h3>
        <p>جرّب كلمة بحث مختلفة</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="card" onclick="window.open('${p.deep_link}','_blank')">
      <div class="card-img">
        ${p.thumb
          ? `<img src="${p.thumb}" alt="${p.title}" loading="lazy">`
          : `🎮`}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(p.title)}</div>
        <div class="card-meta">
          <span class="dl-count">⬇️ ${p.downloads}</span>
          <span>${formatDate(p.created_at)}</span>
        </div>
      </div>
      <a class="card-btn" href="${p.deep_link}" target="_blank">تحميل عبر البوت</a>
    </div>
  `).join("");
}

// ── مساعدات ──────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function formatDate(ts) {
  if (!ts) return "";
  try {
    const d = new Date(ts.replace("T"," ") + "Z");
    return d.toLocaleDateString("ar-IQ", { day:"numeric", month:"short" });
  } catch { return ""; }
}

// ── أحداث ────────────────────────────────
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  render();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ── تحميل عند البدء ──────────────────────
loadPosts();
// تحديث تلقائي كل 5 دقائق
setInterval(loadPosts, 5 * 60 * 1000);
</script>
</body>
</html>
